<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Dominick Limpag | Cybersecurity Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #050d1a;
      color: #c8d8e8;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(0,200,150,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,150,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .scan-line {
      position: fixed; top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #00e6a0, transparent);
      animation: scan 6s linear infinite; z-index: 1; pointer-events: none;
    }
    @keyframes scan { 0%{top:-2px} 100%{top:100%} }

    .content { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* HERO */
    .hero { padding: 3rem 0 2.5rem; border-bottom: 0.5px solid rgba(0,230,160,0.2); }
    .hero-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: #00e6a0; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 1rem;
    }
    .hero-tag::before { content: '> '; opacity: 0.5; }
    .hero h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 500;
      color: #e8f4ff; line-height: 1.15; margin-bottom: 0.5rem;
    }
    .hero h1 span { color: #00e6a0; }
    .hero-title {
      font-size: 14px; color: #7a9bb5; letter-spacing: 1px;
      font-family: 'IBM Plex Mono', monospace; margin-bottom: 1.5rem;
    }
    .hero-contact { display: flex; flex-wrap: wrap; gap: 12px; }
    .contact-chip {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      color: #7a9bb5; background: rgba(0,230,160,0.06);
      border: 0.5px solid rgba(0,230,160,0.2);
      padding: 5px 12px; border-radius: 2px; white-space: nowrap;
    }
    .contact-chip a { color: #00e6a0; text-decoration: none; }

    /* SECTION */
    .section { padding: 2rem 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: #00e6a0; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 0.5px; background: rgba(0,230,160,0.2); }
